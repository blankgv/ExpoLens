services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      #- ./app:/code/app
      #- ./tests:/code/tests
      - .:/code
      - ./weights:/code/weights
    env_file:
      - .env
    environment:
      - PATH=/opt/venv/bin:/usr/local/bin:/usr/bin:/bin
      - UV_PROJECT_ENVIRONMENT=/opt/venv